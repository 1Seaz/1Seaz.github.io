<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eloan Lopez | Portfolio Technique</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --violet:  #000;
            --yankees: #231c40;
            --smoky: #111209;
            --light: #f0f0f5;
            --gray-muted: #b9b9ce;
            --card-bg: #231c40;
            --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background-color: var(--smoky);
            color: var(--light);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* grain texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(99, 84, 159, 0.0) 1.5px, transparent 1.5px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* Container full width */
        .container {
            width: 100%;
            margin: 0;
            padding: 0;
            position: relative;
            z-index: 2;
        }

        /* ========== HEADER / NAV ========== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.6rem 5%;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(99, 84, 159, 0.25);
            background-color: rgba(17, 18, 9, 0);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--violet) 150%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
            font-family: 'Space Grotesk', monospace;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: var(--transition);
            letter-spacing: -0.2px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--light);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--light);
        }

        /* ========== HERO SECTION ========== */
        .hero {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 1rem;
            position: relative;
            background: url('IMG_2352 (1).jpg') center/cover no-repeat;
            border-radius: 0;
            margin-bottom: 0;
            width: 100%;
        }

        /* Overlay sombre pour lisibilité */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(17, 18, 9, 0.85), rgba(35, 28, 64, 0.3));
            border-radius: inherit;
            z-index: 0;
        }

        .hero > * {
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            background: rgba(99, 84, 159, 0.18);
            backdrop-filter: blur(2px);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--violet);
            border: 1px solid rgba(99, 84, 159, 0.3);
            margin-bottom: 2rem;
            display: inline-block;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, var(--violet) 120%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero .technique {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 400;
            color: var(--gray-muted);
            margin-bottom: 1rem;
            font-family: 'Space Grotesk', monospace;
        }

        .hero .year {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--light);
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .hero-buttons {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            transition: var(--transition);
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--violet);
            color: white;
            box-shadow: 0 6px 14px rgba(99, 84, 159, 0.3);
        }

        .btn-primary:hover {
            background: #7c6bb9;
            transform: translateY(-3px);
            box-shadow: 0 12px 22px rgba(99, 84, 159, 0.4);
        }

        .btn-outline {
            border: 1.5px solid var(--violet);
            background: transparent;
            color: var(--light);
        }

        .btn-outline:hover {
            background: rgba(99, 84, 159, 0.15);
            transform: translateY(-3px);
            border-color: #a38fdf;
        }

        /* ========== SECTIONS GÉNÉRALES ========== */
        section {
            padding: 6rem 5%;
            border-bottom: 1px solid rgba(99, 84, 159, 0.15);
            width: 100%;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--violet);
            border-radius: 4px;
        }

        /* ========== PROJETS GRILLE ========== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(99, 84, 159, 0.2);
            backdrop-filter: blur(2px);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--violet);
            box-shadow: var(--shadow-sm);
        }

        .project-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .project-card:hover .project-img {
            transform: scale(1.03);
        }

        .project-info {
            padding: 1.6rem;
        }

        .project-info h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f0eefc;
        }

        .project-tag {
            display: inline-block;
            background: rgba(99, 84, 159, 0.2);
            color: var(--violet);
            font-size: 0.75rem;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .project-info p {
            color: var(--gray-muted);
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
        }

        .project-link {
            color: var(--violet);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s;
        }

        .project-link:hover {
            gap: 12px;
            color: #b7a6f0;
        }

        /* ========== À PROPOS ========== */
        .about-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            align-items: center;
            justify-content: space-between;
        }

        .about-text {
            flex: 1.5;
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }
        .about-text p {
            color: #cfd1e0;
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .skill-badge {
            background: rgba(99, 84, 159, 0.25);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 0.5px solid rgba(99, 84, 159, 0.5);
        }

        .about-icon {
            flex: 1;
            background: var(--yankees);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(99, 84, 159, 0.3);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
        }

        .about-icon i {
            font-size: 5rem;
            color: var(--violet);
            margin-bottom: 1rem;
        }

        .about-icon .quote {
            font-style: italic;
            font-size: 1rem;
            color: var(--gray-muted);
            font-weight: 300;
        }

        /* ========== CONTACT REDESIGN ========== */
        .contact-modern {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-card {
            background: rgba(35, 28, 64, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(99, 84, 159, 0.4);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 650px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
        }

        .contact-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -15px rgba(0,0,0,0.4);
            border-color: var(--violet);
        }

        .contact-icon-big {
            font-size: 3.5rem;
            color: var(--violet);
            margin-bottom: 1rem;
        }

        .contact-card h3 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .contact-info-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .contact-info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.3);
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }

        .contact-info-item i {
            color: var(--violet);
            width: 28px;
            font-size: 1.3rem;
        }

        .contact-info-item span {
            color: var(--light);
        }

        .mail-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--violet);
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            transition: all 0.25s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 14px rgba(99,84,159,0.4);
        }

        .mail-link:hover {
            background: #7c6bb9;
            transform: scale(1.02);
            gap: 16px;
            box-shadow: 0 8px 20px rgba(99,84,159,0.5);
        }

        .social-links-modern {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .social-links-modern a {
            background: rgba(99, 84, 159, 0.2);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            color: var(--light);
            font-size: 1.5rem;
            transition: all 0.2s;
            border: 1px solid rgba(99,84,159,0.3);
        }

        .social-links-modern a:hover {
            background: var(--violet);
            transform: translateY(-4px);
            color: white;
        }

        /* ========== FOOTER ========== */
        footer {
            text-align: center;
            padding: 2rem 5% 3rem;
            color: #7e7d9b;
            font-size: 0.85rem;
            border-top: 1px solid rgba(99,84,159,0.2);
            width: 100%;
        }
        footer {
    text-align: center;
    padding: 2rem 5% 3rem;
    color: #7e7d9b;
    border-top: 1px solid rgba(99,84,159,0.2);
    width: 100%;
}

.footer-icons {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1rem;
}

.footer-icons a {
    background: rgba(99, 84, 159, 0.2);
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 60px;
    color: var(--light);
    font-size: 1.5rem;
    transition: all 0.2s;
    border: 1px solid rgba(99,84,159,0.3);
    text-decoration: none;
}

.footer-icons a:hover {
    background: var(--violet);
    transform: translateY(-4px);
    color: white;
}

.copyright {
    font-size: 0.85rem;
    margin-top: 0.5rem;
}

        /* responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 5%;
            }
            .nav-links {
                gap: 1.5rem;
                flex-wrap: wrap;
            }
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            .about-wrapper {
                flex-direction: column;
            }
            section {
                padding: 3rem 5%;
            }
            .section-title {
                font-size: 1.8rem;
            }
            .contact-card {
                padding: 2rem 1.5rem;
            }
            .contact-info-item {
                font-size: 0.95rem;
                padding: 0.6rem 1rem;
            }
            .mail-link {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
        }

        /* fade-up animation */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .fade-up.appear {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <a href="#">Eloan Lopez<span style="color:var(--violet);"></span></a>
        </div>
        <ul class="nav-links">
            <li><a href="#accueil">Accueil</a></li>
            <li><a href="#projets">Projets</a></li>
            <li><a href="#apropos">À propos</a></li>
            <li><a href="#footer">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero / Accueil avec photo de fond -->
    <section id="accueil" class="hero">
        <h1>Eloan Lopez</h1>
        <div class="technique">Lorem Ipsum</div>
        <div class="year">2026</div>
        <div class="hero-buttons">
            <a href="#projets" class="btn btn-primary"><i class="fas fa-arrow-down"></i> Projets</a>
            <a href="#footer" class="btn btn-outline"><i class="fas fa-paper-plane"></i> Contact</a>
        </div>
    </section>

    <!-- PROJETS SECTION -->
    <section id="projets">
        <div class="fade-up">
            <h2 class="section-title">Projets</h2>
        </div>
        <!-- Ici tu peux ajouter tes projets -->
    </section>

    <!-- À PROPOS -->
    <section id="apropos">
        <div class="about-wrapper">
            <div class="about-text fade-up">
                <h2 class="section-title">À propos</h2>
                <!-- Tu peux décommenter et personnaliser le contenu -->
            </div>
        </div>
    </section>

    </section>

   <footer id="footer">
    <div class="footer-icons">
        <a href="mailto:eloan38@icloud.fr" aria-label="Email">
            <i class="fas fa-envelope"></i>
        </a>
        <a href="https://www.instagram.com/eloan.lpz/" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
    <p class="copyright"><a href="https://op.gg/fr/lol/summoners/euw/1seaz-9924" target="_blank" aria-label="Op.gg"><i class="fas fa-copyright"></i> </a>2026 Tout droits reservés</p>
</footer>
</div>

<script>
    // Animation au scroll (fade-up)
    const fadeElements = document.querySelectorAll('.fade-up');
    
    function checkFade() {
        fadeElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            const windowHeight = window.innerHeight || document.documentElement.clientHeight;
            if (rect.top <= windowHeight - 80) {
                el.classList.add('appear');
            }
        });
    }

    window.addEventListener('scroll', checkFade);
    window.addEventListener('resize', checkFade);
    checkFade();

    // Navigation douce + active link highlight
    const navLinks = document.querySelectorAll('.nav-links a');
    const sections = document.querySelectorAll('section[id]');
    
    function updateActiveLink() {
        let current = '';
        const scrollPos = window.scrollY + 150;
        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            const sectionHeight = section.clientHeight;
            if (scrollPos >= sectionTop && scrollPos < sectionTop + sectionHeight) {
                current = section.getAttribute('id');
            }
        });
        navLinks.forEach(link => {
            link.classList.remove('active');
            const href = link.getAttribute('href').substring(1);
            if (href === current) {
                link.classList.add('active');
            }
        });
    }
    
    window.addEventListener('scroll', updateActiveLink);
    window.addEventListener('load', updateActiveLink);
    
    // Smooth scroll pour ancres
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            const targetId = this.getAttribute('href').substring(1);
            if (targetId && document.getElementById(targetId)) {
                e.preventDefault();
                document.getElementById(targetId).scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
        });
    });
</script>
</body>
</html>
